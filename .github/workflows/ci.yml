name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS)
    # macos-15 ships Xcode 16, which understands newer .xcodeproj formats than
    # the macos-14 image (Xcode 15.4).
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Swift build (Core + misland-hook)
        run: swift build --product misland-hook

      - name: Swift test (unit + integration)
        run: swift test --parallel

      # Pin xcodegen to a version that targets a project format the runner's
      # Xcode can read. The latest xcodegen (2.45+) produces objectVersion 77
      # which only Xcode 26+ can open. v2.39.0 produces objectVersion 56,
      # readable by every Xcode >= 13.
      - name: Install xcodegen 2.39.0 (Xcode 15+ compatible)
        run: |
          curl -fsSL -o xcodegen.zip https://github.com/yonaskolb/XcodeGen/releases/download/2.39.0/xcodegen.zip
          unzip -q xcodegen.zip -d xcodegen-tool
          chmod +x xcodegen-tool/bin/xcodegen
          sudo mv xcodegen-tool/bin/xcodegen /usr/local/bin/xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Misland.app
        run: >
          xcodebuild
          -project Misland.xcodeproj
          -scheme Misland
          -configuration Debug
          -destination 'platform=macOS'
          CODE_SIGN_IDENTITY='-'
          CODE_SIGN_STYLE=Automatic
          DEVELOPMENT_TEAM=''
          ENABLE_HARDENED_RUNTIME=NO
          build

      - name: Locate built bundle
        id: bundle
        run: |
          APP="$(find ~/Library/Developer/Xcode/DerivedData/Misland-* -name 'Misland.app' -type d -maxdepth 5 2>/dev/null | head -1)"
          if [ -z "$APP" ]; then echo "::error::No 'Misland.app' produced by xcodebuild"; exit 1; fi
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $APP"

      - name: Verify bundle integrity
        run: codesign --verify --strict --verbose=2 "${{ steps.bundle.outputs.path }}"

      - name: Verify misland-hook embedded + fail-open smoke
        run: |
          BIN="${{ steps.bundle.outputs.path }}/Contents/MacOS/misland-hook"
          if [ ! -f "$BIN" ]; then echo "::error::misland-hook missing from bundle"; exit 1; fi
          file "$BIN"
          echo '{"hook_event_name":"PreToolUse","cwd":"/tmp","tool_name":"Bash","tool_input":{"command":"ls"}}' | "$BIN"

      - name: Verify zh-Hans localizations
        run: |
          STRINGS="${{ steps.bundle.outputs.path }}/Contents/Resources/zh-Hans.lproj/Localizable.strings"
          if [ ! -f "$STRINGS" ]; then echo "::error::zh-Hans Localizable.strings missing"; exit 1; fi
          COUNT="$(plutil -p "$STRINGS" | grep -c '=>' || true)"
          echo "zh-Hans translations: $COUNT"
          if [ "$COUNT" -lt 40 ]; then echo "::error::expected >=40 strings, got $COUNT"; exit 1; fi
