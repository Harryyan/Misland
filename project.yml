name: MioMini
options:
  bundleIdPrefix: chat.mio
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  MioMiniCore:
    path: .

targets:
  MioMini:
    type: application
    platform: macOS
    sources:
      - path: AppSources
        excludes:
          - "**/.DS_Store"
    info:
      path: AppSources/Info.plist
      properties:
        CFBundleDisplayName: Misland
        CFBundleName: Misland
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.mio.miomini
        PRODUCT_NAME: "Misland"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: MioMiniCore
        product: MioMiniCore
    postBuildScripts:
      - name: Embed miomini-hook
        script: |
          "$PROJECT_DIR/scripts/build-hook.sh"
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
